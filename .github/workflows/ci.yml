name: CI

on:
  push:
  pull_request:

jobs:
  test-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Run Ruff
        run: ruff check .

      - name: Run Bandit
        run: bandit -r . -x ./venv,./tests

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --no-deps --disable-pip
